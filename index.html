<!doctype html>
<html lang="id">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MaxPreps - Network</title>

<style>

:root{
--red:#e10600;
--bg:#f2f3f5;
--container:1100px;
font-family:Inter,Arial,Helvetica,sans-serif;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
}

/* HEADER */

.topbar{
background:var(--red);
color:#fff;
}

.topbar .inner{
max-width:var(--container);
margin:auto;
display:flex;
align-items:center;
padding:12px 20px;
}

.logo img{
height:32px;
}

.nav{
display:flex;
gap:20px;
margin-left:25px;
font-weight:700;
font-size:14px;
}

.nav a{
color:white;
text-decoration:none;
}

.actions{
margin-left:auto;
display:flex;
gap:14px;
font-size:20px;
cursor:pointer;
}

/* MOBILE HEADER */

.mobile-header{
display:none;
background:var(--red);
color:white;
padding:12px 16px;
align-items:center;
justify-content:space-between;
}

.mobile-header img{
height:26px;
}

.mobile-icons{
display:flex;
gap:16px;
font-size:20px;
}

.mobile-menu{
display:none;
background:white;
padding:15px;
border-bottom:1px solid #ddd;
}

.mobile-menu a{
display:block;
padding:10px 0;
text-decoration:none;
color:#111;
font-weight:600;
border-bottom:1px solid #eee;
}

.mobile-menu.show{
display:block;
}

/* AD */

.ad-wrapper{
width:100%;
text-align:center;
background:#fff;
padding:10px 0;
margin:12px 0 20px 0;
border-radius:6px;
box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

/* PAGE */

.page{
max-width:var(--container);
margin:20px auto;
padding:0 20px;
}

.hero{
background:white;
border-radius:10px;
padding:20px;
}

.hero-video{
width:100%;
height:500px;
object-fit:cover;
border-radius:8px;
}

.hero-overlay{
position:relative;
margin-top:-300px;
height:260px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.watch-btn{
background:var(--red);
border:none;
color:white;
padding:12px 28px;
font-weight:700;
border-radius:6px;
cursor:pointer;
}

/* POPUP */

.popup-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:white;
width:92%;
max-width:380px;
border-radius:10px;
padding:20px;
text-align:center;
}

.role-btn{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
background:#f7f7f7;
cursor:pointer;
font-weight:600;
}

/* FOOTER */

.footer{
width:100%;
background:var(--red);
color:white;
text-align:center;
padding:70px 20px;
margin-top:40px;
}

.footer img{
width:150px;
margin-bottom:30px;
}

.footer-links{
font-size:12px;
opacity:.9;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:14px;
}

.footer-links a{
color:white;
text-decoration:none;
}

/* RESPONSIVE */

@media(max-width:768px){

.topbar{
display:none;
}

.mobile-header{
display:flex;
}

.page{
padding:0 14px;
}

.hero-video{
height:320px;
}

}

</style>
</head>
